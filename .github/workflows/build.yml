name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install maui-android workload
        run: dotnet workload install maui-android

      - name: Build
        run: dotnet build Microsoft.AndroidX.Compose.slnx -bl:Microsoft.AndroidX.Compose.binlog

      - name: Test source generators
        run: dotnet test src/Microsoft.AndroidX.Compose.SourceGenerators.Tests --no-build --logger "console;verbosity=normal" --logger "trx;LogFileName=test-results.trx"

      - name: Pack
        run: dotnet pack src/Microsoft.AndroidX.Compose/Microsoft.AndroidX.Compose.csproj --configuration Release --no-restore --output artifacts

      - name: Verify package contents
        shell: bash
        run: |
          package="$(find artifacts -name 'Microsoft.AndroidX.Compose.*.nupkg' -print -quit)"
          unzip -l "$package" | grep -F 'analyzers/dotnet/cs/Microsoft.AndroidX.Compose.SourceGenerators.dll'
          unzip -l "$package" | grep -F 'buildTransitive/Microsoft.AndroidX.Compose.props'

      - name: Test package consumer
        shell: bash
        run: |
          version="$(dotnet msbuild src/Microsoft.AndroidX.Compose/Microsoft.AndroidX.Compose.csproj -getProperty:PackageVersion -nologo)"
          dotnet build tests/Microsoft.AndroidX.Compose.PackageSmoke \
            --property:PackageSmokeSource="$PWD/artifacts" \
            --property:PackageSmokeVersion="$version"
          test -f tests/Microsoft.AndroidX.Compose.PackageSmoke/obj/Generated/Microsoft.AndroidX.Compose.SourceGenerators/AndroidX.Compose.SourceGenerators.ComposableMethodGenerator/Microsoft.AndroidX.Compose.Composable.Interceptors.g.cs

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: Microsoft.AndroidX.Compose.nupkg
          path: artifacts/*.nupkg

      - name: Upload binlog
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Microsoft.AndroidX.Compose.binlog
          path: Microsoft.AndroidX.Compose.binlog

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'
