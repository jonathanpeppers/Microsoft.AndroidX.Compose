name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install android workload
        run: dotnet workload install android

      - name: Build
        run: dotnet build Microsoft.AndroidX.Compose.slnx -bl:Microsoft.AndroidX.Compose.binlog

      - name: Test source generators
        run: dotnet test src/Microsoft.AndroidX.Compose.SourceGenerators.Tests --no-build --logger "console;verbosity=normal" --logger "trx;LogFileName=test-results.trx"

      - name: Upload binlog
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Microsoft.AndroidX.Compose.binlog
          path: Microsoft.AndroidX.Compose.binlog

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'
